<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Journey & Journal Roadmap</title>
<link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Nunito:wght@400;600;700;800&family=Dancing+Script:wght@700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    /* โทนสี S&P: แดง-ขาว-น้ำตาล */
    --cream: #FFFFFF; 
    --blue: #FDFBF7; 
    --pink: #FFF0F1;
    --caramel: #6B4226; 
    --road: #AA1F24; 
    --dark: #2A2A2A;
  }
  body { font-family: 'Nunito', sans-serif; background: var(--blue); overflow-x: hidden; min-height: 100vh; }
  .page { display: none; min-height: 100vh; }
  .page.active { display: block; }

  /* ปุ่มสลับภาษา */
  .lang-btn {
    position: fixed; top: 15px; right: 15px; z-index: 1000;
    background: white; border: 2px solid var(--road); color: var(--road);
    border-radius: 20px; padding: 4px 14px; font-weight: 800; font-family: 'Nunito', sans-serif;
    cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.1); transition: all 0.2s;
  }
  .lang-btn:hover { background: var(--pink); transform: scale(1.05); }

  /* ===== ROADMAP ===== */
  #roadmap-page { background: var(--blue); position: relative; overflow: hidden; }
  .roadmap-header { text-align: center; padding: 36px 20px 8px; }
  .roadmap-header h1 { font-family: 'Pacifico', cursive; font-size: clamp(1.8rem,5vw,3rem); color: var(--road); text-shadow: 2px 2px 0 rgba(0,0,0,0.05); }
  .roadmap-header h1 span { color: var(--caramel); }
  .roadmap-subtitle { font-size: 0.85rem; text-align: center; color: #555; margin: 6px 20px 16px; font-weight: 600; }

  /* ขยายความสูงของ Roadmap ป้องกันการทับซ้อน */
  .scene-wrap { position: relative; width: 100%; max-width: 800px; margin: 0 auto; height: 680px; }
  .scene-svg { position: absolute; inset: 0; width: 100%; height: 100%; }

  .cake-stop {
    position: absolute; display: flex; flex-direction: column; align-items: center;
    cursor: pointer; transition: transform 0.25s ease; z-index: 20;
  }
  .cake-stop:hover { transform: scale(1.1) rotate(-3deg); }
  .cake-circle {
    width: 90px; height: 90px; border-radius: 50%; overflow: hidden;
    border: 4px solid white; box-shadow: 0 6px 18px rgba(0,0,0,0.25); background: #eee;
    display: flex; justify-content: center; align-items: center;
  }
  .cake-circle img { width: 100%; height: 100%; object-fit: cover; object-position: center 55%; transition: all 0.3s ease; }
  
  /* สไตล์เค้กที่ล็อคอยู่ */
  .cake-stop.locked .cake-circle img { filter: brightness(0) opacity(0.6); }
  .cake-stop.locked .cake-label { background: #EAEAEA; color: #888; }

  .cake-label {
    margin-top: 6px; background: white; border-radius: 12px; padding: 3px 10px;
    font-size: 0.7rem; font-weight: 800; color: var(--dark);
    box-shadow: 0 2px 6px rgba(0,0,0,0.12); white-space: nowrap; border: 1px solid #eee;
    transition: all 0.3s ease;
  }

  /* Membership ปลายทาง */
  .membership-stop {
    position: absolute; flex-direction: column; align-items: center;
    cursor: pointer; transition: transform 0.25s ease; z-index: 25;
    display: none; animation: popIn 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
  }
  @keyframes popIn { 0% { transform: scale(0); } 100% { transform: scale(1); } }
  .membership-stop:hover { transform: scale(1.1); }
  .membership-badge {
    width: 90px; height: 90px; border-radius: 50%; background: linear-gradient(135deg, var(--road) 0%, #7A1114 100%);
    border: 4px solid #F5C842; box-shadow: 0 6px 18px rgba(170,31,36,0.35);
    display: flex; justify-content: center; align-items: center; font-size: 2.2rem;
  }

  .start-flag { position: absolute; font-size: 2rem; z-index: 30; left: 4%; top: 6%; }
  .end-flag   { position: absolute; font-size: 2.5rem; z-index: 30; left: 12%; top: 82%; }
  .heart-deco { position: absolute; font-size: 1.5rem; z-index: 5; animation: hb 2s infinite ease-in-out; pointer-events: none; }
  @keyframes hb { 0%,100%{transform:scale(1)} 50%{transform:scale(1.2)} }
  .floaty { position: absolute; pointer-events: none; opacity: 0.6; font-size: 1.3rem; animation: fl 4s ease-in-out infinite; }
  @keyframes fl { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-10px)} }

  /* ===== JOURNAL PAGE ===== */
  #journal-page { background: var(--cream); min-height: 100vh; }
  .journal-container { max-width: 480px; margin: 0 auto; padding: 0 0 60px; border-left: 1px solid #eee; border-right: 1px solid #eee; min-height: 100vh; }

  .back-btn {
    display: inline-flex; align-items: center; gap: 6px; background: var(--road);
    color: white; border: none; padding: 10px 18px; border-radius: 20px;
    font-family: 'Nunito',sans-serif; font-weight: 700; font-size: 0.9rem;
    cursor: pointer; margin: 16px 16px 0;
  }
  .back-btn:hover { background: #7A1114; }

  .deco-section { background: var(--cream); padding: 14px 16px 12px; border-bottom: 2px dashed #ccc; }
  .deco-title { font-weight: 800; font-size: 1rem; text-align: center; text-decoration: underline; margin-bottom: 10px; color: var(--road); }
  .deco-carousel { display: flex; align-items: center; gap: 8px; }
  .deco-scroll { display: flex; gap: 10px; overflow-x: auto; flex: 1; scrollbar-width: none; padding: 4px 0; }
  .deco-scroll::-webkit-scrollbar { display: none; }
  .deco-item {
    flex-shrink: 0; width: 56px; height: 56px; background: white; border-radius: 12px;
    border: 2px solid #eee; cursor: pointer; font-size: 1.8rem;
    display: flex; align-items: center; justify-content: center;
    transition: border-color 0.2s, transform 0.15s; box-shadow: 0 2px 6px rgba(0,0,0,0.05);
  }
  .deco-item:hover { transform: scale(1.08); border-color: var(--caramel); }
  .deco-item.selected { border-color: var(--caramel); background: var(--pink); }
  .carousel-btn {
    width: 34px; height: 34px; border-radius: 50%; background: var(--dark); color: white;
    border: none; font-size: 1rem; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  }
  .add-deco-btn {
    background: var(--pink); color: var(--road); border: 2px dashed var(--road); padding: 10px 20px;
    border-radius: 20px; font-family: 'Nunito',sans-serif; font-weight: 800; font-size: 0.85rem;
    cursor: pointer; margin: 10px 16px 0; display: block; width: calc(100% - 32px); text-align: center;
  }

  .journal-canvas { position: relative; margin: 14px 16px; min-height: 540px; }
  .dropped-decos { position: absolute; inset: 0; pointer-events: none; z-index: 20; }
  .dropped-deco { position: absolute; font-size: 1.8rem; cursor: move; pointer-events: all; user-select: none; }

  /* Title row */
  .journal-title-row { display: flex; align-items: flex-start; gap: 12px; margin-bottom: 14px; position: relative; z-index: 10; }
  .journal-title-block { flex: 1; }
  .field-label { font-size: 0.7rem; color: #888; font-weight: 700; margin-bottom: 2px; }
  .title-input {
    font-family: 'Nunito',sans-serif; font-weight: 800; font-size: 2rem; color: var(--road);
    border: none; background: transparent; outline: none; width: 100%;
  }
  .celebration-input {
    font-family: 'Dancing Script',cursive; font-size: 1.3rem; color: var(--caramel);
    border: none; background: transparent; outline: none; width: 100%; border-bottom: 1px solid #ccc;
  }

  /* Polaroid */
  .polaroid-wrap { display: flex; gap: 14px; align-items: flex-start; margin-bottom: 14px; position: relative; z-index: 10; }
  .polaroid {
    background: white; padding: 8px 8px 26px; box-shadow: 2px 4px 12px rgba(0,0,0,0.15);
    width: 150px; flex-shrink: 0; position: relative; transform: rotate(-1.5deg); cursor: pointer; border: 1px solid #eee;
  }
  .tape {
    position: absolute; top: -11px; left: 50%; transform: translateX(-50%); width: 56px; height: 20px;
    opacity: 0.8; border-radius: 2px;
    background: repeating-linear-gradient(45deg,var(--road) 0,var(--road) 4px,var(--pink) 4px,var(--pink) 8px);
  }
  .polaroid-photo {
    width: 100%; height: 110px; background: linear-gradient(135deg,#f0f0f0,#e0e0e0);
    display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; overflow: hidden;
  }
  .polaroid-photo img.preview { width:100%;height:100%;object-fit:cover;position:absolute;inset:0; }
  .polaroid-placeholder { text-align:center;font-size:0.7rem;color:#888;font-weight:700;z-index:1; }
  .polaroid-cloud { font-size:1.8rem;margin-bottom:3px; }
  .polaroid-date { font-size:0.78rem;font-weight:800;color:var(--dark);text-align:center;margin-top:5px; }
  .polaroid-date input {
    border:none;background:transparent;font-family:'Nunito',sans-serif;
    font-weight:800;font-size:0.78rem;color:var(--dark);width:76px;text-align:center;outline:none;
  }

  /* Journal lines */
  .journal-lines { flex: 1; }
  .lined-textarea {
    width:100%;border:none;background:transparent;outline:none;
    font-family:'Nunito',sans-serif;font-size:0.86rem;line-height:2.2;resize:none;
    background-image:repeating-linear-gradient(transparent,transparent calc(2.2em - 1px),#eee calc(2.2em - 1px),#eee 2.2em);
    color:var(--dark);
  }

  .stars-row { text-align:right;font-size:1rem;color:var(--caramel);letter-spacing:4px;margin:4px 0 6px;position:relative;z-index:10; }
  .journal-divider { border:none;border-top:1px solid #ccc;margin:6px 0; }

  /* Cake stamp section */
  .cake-journal-section { display:flex;gap:14px;align-items:flex-start;position:relative;z-index:10;margin-top:6px; }
  .cake-journal-lines { flex:1; }
  .cake-stamp-area { width:140px;flex-shrink:0; }
  .cake-stamp-frame {
    background:white;padding:8px 8px 10px; border: 1px solid #eee;
    box-shadow:2px 4px 12px rgba(0,0,0,0.12);position:relative;transform:rotate(1deg); cursor:pointer;
  }
  .stamp-pin { position:absolute;top:-13px;left:50%;transform:translateX(-50%);font-size:1.3rem;z-index:5; }
  .cake-stamp-frame img { width:100%;height:90px;object-fit:cover;display:block;border-radius:4px; }
  .cake-stamp-name { text-align:center;font-size:0.72rem;font-weight:800;color:var(--road);margin-top:5px; }
  .stamp-hint { font-size: 0.58rem; color: var(--road); font-weight: bold; text-align: center; margin-top: 4px; }

  .tulip-corner { position:absolute;bottom:0;left:-10px;font-size:2.8rem;opacity:0.7;pointer-events:none; }

  /* Save bar */
  .save-bar {
    background:var(--cream);border-top:1px solid #ddd;padding:12px 16px;
    display:flex;align-items:center;justify-content:space-between;position:sticky;bottom:0;z-index:100;
  }
  .save-hint { font-size:0.7rem;color:#888;font-weight:600;flex:1;text-align:center; }
  .save-btn {
    background:var(--road);color:white;border:none;padding:10px 22px;border-radius:8px;
    font-family:'Nunito',sans-serif;font-weight:800;font-size:0.9rem;cursor:pointer;letter-spacing:1px;flex-shrink:0;
  }
  .save-btn:hover { background:var(--caramel); }

  /* IG EXPORT OVERLAY */
  .share-preview-overlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.9); z-index: 999;
    display: none; flex-direction: column; justify-content: center; align-items: center; padding: 20px;
  }
  .share-preview-overlay.active { display: flex; }
  
  /* ขนาดเทมเพลต 9:16 สัดส่วน IG Story */
  .ig-template-box {
    width: 330px; height: 586px; /* อัตราส่วน 9:16 โดยประมาณ */
    background: linear-gradient(180deg, #FFF5F5 0%, #FFF0F1 100%);
    border-radius: 20px; padding: 24px; position: relative;
    color: var(--road); box-shadow: 0 8px 24px rgba(0,0,0,0.5);
    display: flex; flex-direction: column; justify-content: space-between; overflow: hidden;
  }
  .ig-header { text-align: center; position: relative; z-index: 2;}
  .ig-header h2 { font-family: 'Pacifico', cursive; font-size: 26px; color: var(--road); }
  .ig-badge-title {
    background: var(--road); color: white; font-size: 11px; padding: 4px 12px;
    border-radius: 20px; display: inline-block; margin-top: 8px; font-weight: 700;
  }
  .ig-sticker-space {
    background: white; border: 3px dashed var(--road); border-radius: 16px;
    flex: 1; margin: 16px 0; display: flex; flex-direction: column;
    justify-content: center; align-items: center; text-align: center; padding: 14px; position: relative; z-index: 2;
  }
  .ig-sticker-space img { width: 110px; height: 110px; border-radius: 50%; object-fit: cover; border: 2px solid var(--road); }
  .ig-note-preview { font-style: italic; font-size: 13px; color: #444
